<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كاسبر — حسابي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#060b14;--bg2:#0d1525;--bg3:#111e35;--card:#0f1c30;--border:#1e3a5f;--blue:#1b8ef8;--cyan:#00d4ff;--green:#22d97a;--red:#ff4757;--purple:#a855f7;--gold:#ffd32a;--text:#e8f0fe;--muted:#6b8cba}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.nav{position:sticky;top:0;z-index:100;background:rgba(6,11,20,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px}
.nav-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px}
.nav-logo{font-size:20px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#1b8ef8,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
.nav-link{color:var(--muted);font-size:13px;text-decoration:none;transition:color .2s}
.nav-link:hover{color:var(--blue)}
.wrap{max-width:900px;margin:0 auto;padding:32px 20px}

/* LOGIN SCREEN */
.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:48px 32px;text-align:center;max-width:420px;margin:60px auto}
.login-icon{font-size:60px;margin-bottom:16px}
.login-card h2{font-size:24px;font-weight:800;margin-bottom:8px}
.login-card p{color:var(--muted);font-size:14px;margin-bottom:28px;line-height:1.6}
.phone-input{width:100%;background:var(--bg3);border:2px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit;font-size:20px;padding:14px;outline:none;text-align:center;letter-spacing:3px;transition:border-color .2s;margin-bottom:16px}
.phone-input:focus{border-color:var(--blue)}
.login-btn{width:100%;background:linear-gradient(135deg,var(--blue),var(--cyan));border:none;border-radius:12px;color:#fff;font-family:inherit;font-size:16px;font-weight:700;padding:14px;cursor:pointer;transition:all .2s}
.login-btn:hover{opacity:.9;transform:translateY(-1px)}

/* PROFILE */
.profile-header{display:flex;align-items:center;gap:20px;margin-bottom:28px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px}
.profile-avatar{width:70px;height:70px;background:linear-gradient(135deg,var(--purple),var(--blue));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0}
.profile-name{font-size:22px;font-weight:800;margin-bottom:4px}
.profile-phone{color:var(--muted);font-size:14px;margin-bottom:8px}
.logout-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:inherit;font-size:12px;padding:5px 12px;border-radius:8px;cursor:pointer;transition:all .2s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* SUB CARD */
.sub-card{border-radius:16px;padding:24px;margin-bottom:24px;position:relative;overflow:hidden}
.sub-card.active{background:linear-gradient(135deg,rgba(27,142,248,.15),rgba(0,212,255,.08));border:1px solid rgba(27,142,248,.3)}
.sub-card.expiring{background:linear-gradient(135deg,rgba(255,211,42,.12),rgba(255,140,66,.08));border:1px solid rgba(255,211,42,.4)}
.sub-card.expired{background:rgba(255,71,87,.06);border:1px solid rgba(255,71,87,.2)}
.sub-card.no-sub{background:var(--card);border:1px solid var(--border);text-align:center;padding:40px}
.sub-status{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:12px}
.status-active{background:rgba(34,217,122,.15);color:var(--green)}
.status-expiring{background:rgba(255,211,42,.15);color:var(--gold)}
.status-expired{background:rgba(255,71,87,.15);color:var(--red)}
.plan-name{font-size:20px;font-weight:900;margin-bottom:4px}
.plan-amount{color:var(--green);font-size:15px;font-weight:700;margin-bottom:16px}

/* COUNTDOWN */
.countdown{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.cd-box{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:center;min-width:70px}
.cd-num{font-size:28px;font-weight:900;color:var(--cyan);line-height:1;font-variant-numeric:tabular-nums}
.cd-lbl{font-size:10px;color:var(--muted);margin-top:2px}

/* GAMES GRID */
.section-title{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:32px}
.game-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .25s;cursor:pointer}
.game-card:hover{transform:translateY(-4px);border-color:var(--blue);box-shadow:0 8px 30px rgba(27,142,248,.2)}
.game-img{width:100%;aspect-ratio:16/9;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:36px;min-height:100px}
.game-img img{width:100%;height:100%;object-fit:cover}
.game-info{padding:10px}
.game-name{font-size:13px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-cat{font-size:11px;color:var(--muted);margin-bottom:8px}
.play-btn{width:100%;background:linear-gradient(135deg,var(--blue),var(--cyan));border:none;border-radius:8px;color:#fff;font-family:inherit;font-size:12px;font-weight:700;padding:8px;cursor:pointer;transition:all .2s}
.play-btn:hover{opacity:.9}
.no-access-btn{width:100%;background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);border-radius:8px;color:var(--red);font-family:inherit;font-size:11px;font-weight:600;padding:8px;cursor:not-allowed}

/* TOAST */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;min-width:200px;animation:toastIn .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.success{border-color:var(--green)}.toast.error{border-color:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* RENEW BANNER */
.renew-banner{background:linear-gradient(135deg,rgba(255,211,42,.1),rgba(255,140,66,.08));border:1px solid rgba(255,211,42,.3);border-radius:12px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.renew-banner p{font-size:13px;color:var(--gold)}
.renew-btn{background:#25D366;border:none;border-radius:8px;color:#fff;font-family:inherit;font-size:13px;font-weight:700;padding:8px 16px;cursor:pointer;white-space:nowrap}

@media(max-width:600px){
  .profile-header{flex-direction:column;text-align:center}
  .countdown{justify-content:center}
  .games-grid{grid-template-columns:repeat(2,1fr);gap:10px}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-logo" href="index.html">👻 كاسبر</a>
    <a class="nav-link" href="index.html">← العودة للمتجر</a>
  </div>
</nav>

<div class="wrap">
  <!-- LOGIN -->
  <div id="loginSection">
    <div class="login-card">
      <div class="login-icon">🎮</div>
      <h2>أهلاً بك في كاسبر</h2>
      <p>أدخل رقم جوالك لتشوف اشتراكك وتلعب ألعابك</p>
      <input class="phone-input" id="phoneInput" type="tel" placeholder="07XXXXXXXXX"
        onkeydown="if(event.key==='Enter')checkAccess()">
      <button class="login-btn" onclick="checkAccess()">🔍 تحقق من اشتراكي</button>
    </div>
  </div>

  <!-- PROFILE -->
  <div id="profileSection" style="display:none">
    <div class="profile-header">
      <div class="profile-avatar">👤</div>
      <div style="flex:1">
        <div class="profile-name" id="profileName">—</div>
        <div class="profile-phone" id="profilePhone">—</div>
        <button class="logout-btn" onclick="logout()">تسجيل خروج</button>
      </div>
    </div>

    <!-- Sub card -->
    <div id="subCard"></div>

    <!-- Renew banner -->
    <div class="renew-banner" id="renewBanner" style="display:none">
      <p>⚠️ اشتراكك ينتهي قريباً — تواصل معنا لتجديده</p>
      <button class="renew-btn" onclick="openWhatsApp()">📲 تجديد عبر واتساب</button>
    </div>

    <!-- Games -->
    <div id="gamesSection" style="display:none">
      <div class="section-title">🎮 ألعابك</div>
      <div class="games-grid" id="gamesGrid"></div>
    </div>

    <div id="noSubSection" style="display:none;text-align:center;padding:40px 0">
      <div style="font-size:60px;margin-bottom:16px">🔒</div>
      <h3 style="margin-bottom:8px">ما عندك اشتراك نشط</h3>
      <p style="color:var(--muted);margin-bottom:24px">تواصل معنا لتفعيل اشتراكك والوصول لكامل المكتبة</p>
      <button onclick="openWhatsApp()" style="background:#25D366;border:none;border-radius:12px;color:#fff;font-family:inherit;font-size:15px;font-weight:700;padding:14px 28px;cursor:pointer">📲 تواصل عبر واتساب</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>



<script>



const KEYS={games:'vapor_games',access:'vapor_access'};
let userPhone='', userAccess=null, allGames=[], cdInterval=null;

function init(){
  const saved=localStorage.getItem('vapor_user_phone');
  if(saved){ document.getElementById('phoneInput').value=saved; checkAccess(); }
}

async function checkAccess(){
  const ph=document.getElementById('phoneInput').value.trim();
  if(!ph||ph.length<7){showToast('⚠️ أدخل رقم جوال صحيح','error');return;}
  userPhone=ph;
  localStorage.setItem('vapor_user_phone',ph);


  try{
    const [gDoc,aDoc]=await Promise.all([db.collection('vapor').doc('games').get(),db.collection('vapor').doc('access').get()]);
    allGames=gDoc.exists?(gDoc.data().items||[]):JSON.parse(localStorage.getItem(KEYS.games)||'[]');
    var accessList=aDoc.exists?(aDoc.data().items||[]):JSON.parse(localStorage.getItem(KEYS.access)||'[]');
  }catch(e){
    allGames=JSON.parse(localStorage.getItem(KEYS.games)||'[]');
    var accessList=JSON.parse(localStorage.getItem(KEYS.access)||'[]');
  }
  const now=new Date();

  // Match phone flexibly
  const acc=accessList.find(a=>{
    const ap=a.phone.replace(/[^0-9]/g,'');
    const up=ph.replace(/[^0-9]/g,'');
    return ap===up||ap.endsWith(up)||up.endsWith(ap);
  });

  userAccess=acc||null;

  document.getElementById('loginSection').style.display='none';
  document.getElementById('profileSection').style.display='block';
  renderProfile();
}

function renderProfile(){
  const nameEl=document.getElementById('profileName');
  const phoneEl=document.getElementById('profilePhone');
  const subCard=document.getElementById('subCard');
  const renewBanner=document.getElementById('renewBanner');
  const gamesSection=document.getElementById('gamesSection');
  const noSubSection=document.getElementById('noSubSection');

  phoneEl.textContent='📱 '+userPhone;

  if(!userAccess||userAccess.status==='expired'||new Date(userAccess.expiresAt)<new Date()){
    nameEl.textContent='مشترك';
    subCard.innerHTML=`<div class="sub-card no-sub"><div style="font-size:50px;margin-bottom:12px">🔒</div><p style="color:var(--muted)">لا يوجد اشتراك نشط</p></div>`;
    noSubSection.style.display='block';
    gamesSection.style.display='none';
    renewBanner.style.display='none';
    return;
  }

  nameEl.textContent=userAccess.name;
  noSubSection.style.display='none';

  const exp=new Date(userAccess.expiresAt);
  const now=new Date();
  const leftMs=exp-now;
  const leftH=leftMs/1000/3600;
  const leftD=leftH/24;

  let statusClass='active',statusLabel='🟢 نشط',cardClass='active';
  if(leftH<=24){ statusClass='expiring';statusLabel='⚠️ ينتهي اليوم';cardClass='expiring';renewBanner.style.display='flex'; }
  else if(leftD<=3){ statusClass='expiring';statusLabel='⚠️ ينتهي قريباً';cardClass='expiring';renewBanner.style.display='flex'; }
  else{ renewBanner.style.display='none'; }

  subCard.innerHTML=`
    <div class="sub-card ${cardClass}">
      <span class="sub-status status-${statusClass}">${statusLabel}</span>
      <div class="plan-name">خطة ${planLabel(userAccess.plan)}</div>
      <div class="plan-amount">${userAccess.amount||''} IQD/شهر</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">⏱ الوقت المتبقي للانتهاء</div>
      <div class="countdown" id="countdown"></div>
      <div style="font-size:12px;color:var(--muted)">📅 ينتهي في: ${exp.toLocaleDateString('ar-IQ',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
    </div>`;

  updateCountdown();
  if(cdInterval) clearInterval(cdInterval);
  cdInterval=setInterval(updateCountdown,1000);

  // Render games
  const myGames=allGames.filter(g=>userAccess.games.includes(g.id)&&g.active!==false);
  if(myGames.length){
    gamesSection.style.display='block';
    document.getElementById('gamesGrid').innerHTML=myGames.map(g=>`
      <div class="game-card">
        <div class="game-img">${g.image?`<img src="${g.image}" onerror="this.parentElement.innerHTML='${g.emoji||'🎮'}'">`:g.emoji||'🎮'}</div>
        <div class="game-info">
          <div class="game-name">${g.name}</div>
          <div class="game-cat">${g.category||''}</div>
          ${g.gameUrl
            ?`<button class="play-btn" onclick="launchGame('${g.gameUrl}','${g.name}')">▶ العب الآن</button>`
            :`<button class="no-access-btn">⏳ قريباً</button>`}
        </div>
      </div>`).join('');
  } else {
    gamesSection.style.display='none';
  }
}

function updateCountdown(){
  const el=document.getElementById('countdown');
  if(!el||!userAccess) return;
  const left=new Date(userAccess.expiresAt)-new Date();
  if(left<=0){ el.innerHTML='<span style="color:var(--red);font-weight:700">⛔ انتهى الاشتراك</span>'; return; }
  const d=Math.floor(left/1000/3600/24);
  const h=Math.floor((left/1000/3600)%24);
  const m=Math.floor((left/1000/60)%60);
  const s=Math.floor((left/1000)%60);
  el.innerHTML=`
    <div class="cd-box"><div class="cd-num">${String(d).padStart(2,'0')}</div><div class="cd-lbl">يوم</div></div>
    <div class="cd-box"><div class="cd-num">${String(h).padStart(2,'0')}</div><div class="cd-lbl">ساعة</div></div>
    <div class="cd-box"><div class="cd-num">${String(m).padStart(2,'0')}</div><div class="cd-lbl">دقيقة</div></div>
    <div class="cd-box"><div class="cd-num">${String(s).padStart(2,'0')}</div><div class="cd-lbl">ثانية</div></div>`;
}

function launchGame(url,name){
  showToast('▶ جاري فتح '+name,'success');
  setTimeout(()=>window.open(url,'_blank'),500);
}



function getWhatsapp(){return localStorage.getItem('casper_whatsapp')||'9647715240130';}
function openWhatsApp(){
  const msg=encodeURIComponent('مرحباً، أريد تجديد اشتراك كاسبر\nرقمي: '+userPhone);
  window.open('https://wa.me/'+getWhatsapp().replace(/[^0-9]/g,'')+'?text='+msg,'_blank');
}

function logout(){
  localStorage.removeItem('vapor_user_phone');
  userPhone=''; userAccess=null;
  if(cdInterval) clearInterval(cdInterval);
  document.getElementById('loginSection').style.display='block';
  document.getElementById('profileSection').style.display='none';
  document.getElementById('phoneInput').value='';
}

function planLabel(p){return{basic:'أساسي',pro:'برو',premium:'بريميم'}[p]||p||''}

function showToast(msg,type='success'){
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div');
  t.className='toast '+type;t.textContent=msg;
  c.appendChild(t);setTimeout(()=>t.remove(),3000);
}

init();
</script>
</body>
</html>
